<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>controle financeiro</title>
  </head>
  <body class="bg-gray-100">
    <!-- Container principal -->
    <div id="container-pai" class="w-full flex min-h-screen">
      <!-- Menu de navegação -->
      <nav
        id="container-menu-filho-1"
        class="w-[240px] bg-green-800 text-white p-2 flex flex-col"
      >
        <!-- Lista de navegação -->
        <ul
          id="lista-navegacao"
          class="w-full flex flex-col gap-4 mt-10 text-lg"
        >
          <li>
            <button
              id="btn-dashboard"
              class="w-full text-sm gap-1 p-1 flex text-left items-center hover:bg-green-700 text-white rounded hover:scale-105 transition-transform duration-200 active:scale-95"
            >
              <img src="./src/assets/apartment.png" alt="" class="w-5 h-5" />
              <span class="mt-1">Dashboard</span>
            </button>
          </li>
          <li>
            <button
              id="btn-renda"
              class="w-full gap-1 text-sm p-1 flex items-center text-left hover:bg-green-700 text-white rounded hover:scale-105 transition-transform duration-200 active:scale-95"
            >
              <img src="./src/assets/money.png" alt="" class="w-5 h-5" />
              <span class="mt-1">Renda</span>
            </button>
          </li>
          <li class="w-full flex items-center gap-1">
            <button
              id="btn-contas"
              class="w-full gap-1 text-sm p-1 flex items-center text-left hover:bg-green-700 text-white rounded hover:scale-105 transition-transform duration-200 active:scale-95"
            >
              <img src="./src/assets/bar-chart.png" alt="" class="w-5 h-5" />
              <span class="mt-1">Contas</span>
            </button>
          </li>
          <li class="w-full flex items-center gap-1">
            <button
              id="btn-cofrinho"
              class="w-full gap-1 text-sm p-1 flex items-center text-left hover:bg-green-700 text-white rounded hover:scale-105 transition-transform duration-200 active:scale-95"
            >
              <img src="./src/assets/piggy-bank.png" alt="" class="w-5 h-5" />
              <span class="mt-1">Cofrinho</span>
            </button>
          </li>
        </ul>
        <!-- Lista de navegação fim -->
      </nav>
      <!-- Menu de navegação fim -->

      <!-- Conteúdo principal -->
      <main id="container-conteudo-filho-2" class="w-[100%] bg-gray-50"></main>
      <!-- Conteúdo principal fim -->
    </div>
    <!-- container principal fim -->

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
<!-- flex items-center -->
