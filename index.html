<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/style.css" />
    <title>controle financeiro</title>
  </head>
  <body class="bg-gray-100">
    <!-- Container principal -->
    <div id="container-pai" class="w-full flex min-h-screen">
      <!-- Menu de navegação -->
      <nav
        id="container-menu-filho-1"
        class="w-[240px] bg-green-800 text-white p-2 flex flex-col"
      >
        <!-- Lista de navegação -->
        <ul
          id="lista-navegacao"
          class="w-full flex flex-col gap-4 mt-10 text-lg"
        >
          <li>
            <button
              id="btn-dashboard"
              class="w-full gap-1 p-1 flex items-center text-left hover:bg-green-700 text-white rounded"
            >
              <img src="./src/assets/apartment.png" alt="" class="w-5 h-5" />
              Dashboard
            </button>
          </li>
          <li>
            <button
              id="btn-renda"
              class="w-full gap-1 p-1 flex items-center text-left hover:bg-green-700 text-white rounded"
            >
              <img src="./src/assets/money.png" alt="" class="w-5 h-5" />
              Renda
            </button>
          </li>
          <li class="w-full flex items-center gap-1">
            <button
              id="btn-contas"
              class="w-full gap-1 p-1 flex items-center text-left hover:bg-green-700 text-white rounded"
            >
              <img src="./src/assets/bar-chart.png" alt="" class="w-5 h-5" />
              Contas
            </button>
          </li>
          <li class="w-full flex items-center gap-1">
            <button
              id="btn-cofrinho"
              class="w-full gap-1 p-1 flex items-center text-left hover:bg-green-700 text-white rounded"
            >
              <img src="./src/assets/piggy-bank.png" alt="" class="w-5 h-5" />
              Cofrinho
            </button>
          </li>
        </ul>
        <!-- Lista de navegação fim -->
      </nav>
      <!-- Menu de navegação fim -->

      <!-- Conteúdo principal -->
      <main id="container-conteudo-filho-2" class="w-[100%] bg-gray-50">
        <!-- fundo escurecido -->
        <div
          id="fundo-escuro"
          class="w-full h-full bg-black/50 hidden fixed inset-0 z-50"
        >
          <!-- formulario de cadastro de renda -->
          <div
            id="formulario-cadastro-renda"
            class="w-full h-full flex items-center justify-center"
          >
            <form>
              <div class="w-[400px] bg-white p-6 rounded shadow">
                <h2 class="text-2xl font-bold mb-4">Cadastro de Renda</h2>
                <div class="mb-4">
                  <label for="descricao" class="block text-gray-700"
                    >Tipo de Renda</label
                  >
                  <select name="" id="" class="w-full px-3 py-2 border rounded">
                    <option disabled selected value="">
                      Selecione uma opção
                    </option>
                    <option value="salario">Salário</option>
                    <option value="freelance">Freelance</option>
                    <option value="investimentos">Investimentos</option>
                    <option value="hora_extra">Hora Extra</option>
                    <option value="comissao">Comissão</option>
                    <option value="aluguel_recebido">Aluguel Recebido</option>
                    <option value="dividendos">Dividendos</option>
                    <option value="presente">Presente</option>
                    <option value="restituicao">Restituição</option>
                    <option value="outros">Outros</option>
                  </select>
                </div>
                <div class="mb-4">
                  <label for="valor" class="block text-gray-700">Valor</label>
                  <input
                    type="number"
                    id="valor"
                    name="valor"
                    class="w-full px-3 py-2 border rounded"
                    placeholder="Digite o valor"
                  />
                </div>
                <div class="mb-4">
                  <label for="data" class="block text-gray-700"
                    >Data de Recebimento</label
                  >
                  <input
                    type="date"
                    id="data"
                    name="data"
                    class="w-full px-3 py-2 border rounded"
                  />
                </div>
                <div class="mb-4">
                  <label for="descricao" class="block text-gray-700"
                    >Descrição</label
                  >
                  <input
                    type="text"
                    id="descricao"
                    name="descricao"
                    class="w-full px-3 py-2 border rounded"
                    placeholder="Digite uma descrição"
                  />
                </div>
                <!-- botão de cadastro e cancelar -->
                <div class="flex justify-between gap-2">
                  <button
                    id="btn-model-cadastrar"
                    class="w-full bg-green-800 text-white py-2 rounded hover:bg-green-700"
                  >
                    Cadastrar
                  </button>
                  <button
                    id="btn-model-cancelar"
                    class="w-full bg-red-800 text-white py-2 rounded hover:bg-red-700"
                  >
                    Cancelar
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </main>
      <!-- Conteúdo principal fim -->
    </div>
    <!-- container principal fim -->

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
